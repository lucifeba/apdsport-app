<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APD SPORT â Plataforma de Entrenamiento</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
  <style>
    :root {
      --bg: #0A0A0A;
      --bg2: #111111;
      --card: #161616;
      --card2: #1E1E1E;
      --border: #2A2A2A;
      --orange: #F97316;
      --orange2: #EA6A0A;
      --orange-dim: rgba(249,115,22,0.15);
      --white: #FFFFFF;
      --gray: #888888;
      --gray2: #555555;
      --green: #22C55E;
      --red: #EF4444;
      --blue: #3B82F6;
      --text: #F1F1F1;
      --text2: #AAAAAA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Layout */
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px; min-height: 100vh; background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 100;
    }
    .main { margin-left: 240px; flex: 1; min-height: 100vh; }

    /* Sidebar */
    .sidebar-logo {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo-text {
      font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
      color: var(--white);
    }
    .logo-text span { color: var(--orange); }
    .logo-sub { font-size: 10px; color: var(--gray); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
    .nav-section { padding: 12px 12px 0; }
    .nav-label { font-size: 10px; color: var(--gray2); letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 8px 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      color: var(--gray); font-size: 14px; font-weight: 500;
      transition: all 0.15s; margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--card); color: var(--text); }
    .nav-item.active { background: var(--orange-dim); color: var(--orange); }
    .nav-item svg { flex-shrink: 0; }
    .sidebar-footer {
      margin-top: auto; padding: 16px;
      border-top: 1px solid var(--border);
    }
    .version-badge {
      font-size: 11px; color: var(--gray2);
      text-align: center;
    }

    /* Page */
    .page { padding: 32px 36px; max-width: 1200px; }
    .page-header { margin-bottom: 28px; }
    .page-title { font-size: 28px; font-weight: 800; color: var(--white); }
    .page-sub { font-size: 14px; color: var(--gray); margin-top: 4px; }

    /* Cards */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
    }
    .card-title { font-size: 13px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

    /* Stat cards */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
    }
    .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--white); }
    .stat-label { font-size: 13px; color: var(--gray); margin-top: 2px; }
    .stat-delta { font-size: 12px; color: var(--green); margin-top: 4px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 18px; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--orange); color: #fff; }
    .btn-primary:hover { background: var(--orange2); }
    .btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-ghost { background: transparent; color: var(--gray); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--gray2); }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-success { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-xs { padding: 4px 10px; font-size: 12px; }
    .btn-icon { padding: 8px; border-radius: 8px; }

    /* Inputs */
    input, select, textarea {
      background: var(--card2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 10px 12px;
      font-size: 14px; width: 100%;
      transition: border-color 0.15s; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--orange); }
    input::placeholder { color: var(--gray2); }
    select option { background: var(--card2); }
    label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 5px; }
    .form-group { margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Tags / Badges */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-orange { background: var(--orange-dim); color: var(--orange); }
    .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-gray { background: var(--card2); color: var(--gray); }

    /* Muscle group pill */
    .muscle-pill {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      border: 1px solid transparent; transition: all 0.15s;
      background: var(--card2); color: var(--gray);
    }
    .muscle-pill:hover { border-color: var(--orange); color: var(--orange); }
    .muscle-pill.active { background: var(--orange-dim); color: var(--orange); border-color: var(--orange); }

    /* Exercise card */
    .exercise-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: all 0.15s;
    }
    .exercise-card:hover { border-color: var(--orange); background: var(--card2); }
    .exercise-card.selected { border-color: var(--orange); background: var(--orange-dim); }
    .exercise-icon {
      width: 42px; height: 42px; border-radius: 10px;
      background: var(--card2); display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .exercise-info { flex: 1; min-width: 0; }
    .exercise-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .exercise-meta { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .exercises-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }

    /* Workout card */
    .workout-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; cursor: pointer;
      transition: all 0.15s;
    }
    .workout-card:hover { border-color: var(--orange); }
    .workout-card-name { font-size: 16px; font-weight: 700; color: var(--white); }
    .workout-card-meta { font-size: 13px; color: var(--gray); margin-top: 6px; }
    .workout-exercises-preview { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .workouts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

    /* Session */
    .session-exercise {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; margin-bottom: 16px;
    }
    .session-exercise-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .session-exercise-name { font-size: 15px; font-weight: 700; color: var(--white); }
    .sets-table { width: 100%; border-collapse: collapse; }
    .sets-table th { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; padding: 0 8px 8px; text-align: left; }
    .sets-table td { padding: 6px 8px; }
    .sets-table tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
    .set-input { width: 80px; text-align: center; padding: 7px 8px; }
    .set-number { font-size: 13px; color: var(--gray); font-weight: 600; }
    .set-done { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: none; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: var(--card2); }
    .set-done.done { background: rgba(34,197,94,0.2); }

    /* Timer */
    .timer-bar {
      position: fixed; top: 0; left: 240px; right: 0;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 12px 36px; display: flex; align-items: center; justify-content: space-between;
      z-index: 50;
    }
    .timer-text { font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--orange); }
    .timer-label { font-size: 12px; color: var(--gray); }

    /* Progress */
    .chart-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px;
    }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 20px;
    }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; width: 100%;
      max-width: 560px; max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 20px; font-weight: 800; color: var(--white); margin-bottom: 20px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      font-size: 14px; color: var(--text);
      z-index: 300; animation: slideUp 0.2s ease;
      display: flex; align-items: center; gap: 10px;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* History list */
    .history-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 16px;
    }
    .history-date { font-size: 12px; color: var(--gray); min-width: 80px; }
    .history-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .history-stats { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .history-volume { font-size: 20px; font-weight: 800; color: var(--orange); min-width: 80px; text-align: right; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--gray);
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state-title { font-size: 18px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
    .empty-state p { font-size: 14px; max-width: 300px; margin: 0 auto 20px; }

    /* Search bar */
    .search-bar { position: relative; }
    .search-bar input { padding-left: 36px; }
    .search-bar svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--gray); }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* Responsive */
    @media (max-width: 900px) {
      .sidebar { width: 60px; }
      .sidebar-logo, .nav-label, .nav-item span, .logo-sub, .sidebar-footer { display: none; }
      .nav-item { justify-content: center; padding: 12px; }
      .main { margin-left: 60px; }
      .timer-bar { left: 60px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
      .page { padding: 20px 16px; }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

// âââ WORKOUTS âââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function Workouts({ workouts, setWorkouts, setPage, setActiveWorkout }) {
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name:'', description:'', color:'#F97316', exercises:[] });
  const [exSearch, setExSearch] = useState('');
  const [exFilter, setExFilter] = useState('Todos');
  const [toast, setToast] = useState('');

  function openNew() {
    setEditing(null);
    setForm({ name:'', description:'', color:'#F97316', exercises:[] });
    setShowModal(true);
  }
  function openEdit(w) {
    setEditing(w.id);
    setForm({ name:w.name, description:w.description, color:w.color, exercises:[...w.exercises] });
    setShowModal(true);
  }
  function saveWorkout() {
    if (!form.name.trim()) return;
    if (editing) {
      const updated = workouts.map(w => w.id===editing ? {...w,...form} : w);
      setWorkouts(updated);
      save('workouts', updated);
    } else {
      const nw = [...workouts, { ...form, id: 'w'+Date.now() }];
      setWorkouts(nw);
      save('workouts', nw);
    }
    setShowModal(false);
    setToast(editing ? 'Rutina actualizada â' : 'Rutina creada â');
  }
  function deleteWorkout(id) {
    const updated = workouts.filter(w => w.id !== id);
    setWorkouts(updated);
    save('workouts', updated);
  }
  function toggleEx(id) {
    setForm(f => ({
      ...f,
      exercises: f.exercises.includes(id) ? f.exercises.filter(e=>e!==id) : [...f.exercises, id]
    }));
  }
  function startWorkout(w) {
    setActiveWorkout(w);
    setPage('session');
  }

  const filtEx = EXERCISES.filter(e =>
    (exFilter==='Todos'||e.muscle===exFilter) &&
    e.name.toLowerCase().includes(exSearch.toLowerCase())
  );

  const COLORS = ['#F97316','#3B82F6','#22C55E','#A855F7','#EC4899','#EAB308'];

  return (
    <div className="page">
      {toast && <Toast msg={toast} onClose={() => setToast('')}/>}
      <div className="page-header">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div className="page-title">Mis Rutinas</div>
            <div className="page-sub">{workouts.length} rutinas guardadas</div>
          </div>
          <button className="btn btn-primary" onClick={openNew}><Icon name="plus" size={15}/>Nueva Rutina</button>
        </div>
      </div>

      {workouts.length === 0 ? (
        <div className="empty-state">
          <div className="empty-state-icon">ð</div>
          <div className="empty-state-title">Sin rutinas todavÃ­a</div>
          <p>Crea tu primera rutina personalizada con los ejercicios que quieras.</p>
          <button className="btn btn-primary" onClick={openNew}><Icon name="plus" size={15}/>Crear Rutina</button>
        </div>
      ) : (
        <div className="workouts-grid">
          {workouts.map(w => {
            const exs = w.exercises.map(id => EXERCISES.find(e=>e.id===id)).filter(Boolean);
            return (
              <div key={w.id} className="workout-card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                  <div style={{width:4,height:'100%',background:w.color,borderRadius:4,alignSelf:'stretch',marginRight:4,marginLeft:-4}}/>
                  <div style={{flex:1}}>
                    <div className="workout-card-name">{w.name}</div>
                    <div className="workout-card-meta">{w.description}</div>
                  </div>
                </div>
                <div className="workout-exercises-preview">
                  {exs.slice(0,5).map(e => <span key={e.id} className="badge badge-gray">{e.icon} {e.name}</span>)}
                  {exs.length > 5 && <span className="badge badge-gray">+{exs.length-5}</span>}
                </div>
                <div className="divider"/>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={() => startWorkout(w)}>
                    <Icon name="play" size={13}/>Iniciar
                  </button>
                  <button className="btn btn-secondary btn-sm btn-icon" onClick={() => openEdit(w)}><Icon name="edit" size={14}/></button>
                  <button className="btn btn-danger btn-sm btn-icon" onClick={() => deleteWorkout(w.id)}><Icon name="trash" size={14}/></button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {showModal && (
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth:640}}>
            <div className="modal-title">{editing ? 'Editar Rutina' : 'Nueva Rutina'}</div>

            <div className="form-row">
              <div className="form-group">
                <label>Nombre de la rutina *</label>
                <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Ej: Empuje â Lunes"/>
              </div>
              <div className="form-group">
                <label>DescripciÃ³n</label>
                <input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Ej: Pecho, Hombros, TrÃ­ceps"/>
              </div>
            </div>

            <div className="form-group">
              <label>Color de la rutina</label>
              <div style={{display:'flex',gap:8}}>
                {COLORS.map(c => (
                  <div key={c} onClick={() => setForm(f=>({...f,color:c}))}
                    style={{width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',
                      border: form.color===c ? '3px solid white' : '3px solid transparent', transition:'all 0.15s'}}/>
                ))}
              </div>
            </div>

            <div className="divider"/>
            <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:10}}>
              Ejercicios seleccionados: <span style={{color:'var(--orange)'}}>{form.exercises.length}</span>
            </div>

            <div className="search-bar" style={{marginBottom:8}}>
              <Icon name="search" size={14} color="var(--gray)"/>
              <input value={exSearch} onChange={e=>setExSearch(e.target.value)} placeholder="Buscar ejercicio..."/>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:10}}>
              {['Todos','Pecho','Espalda','Piernas','Hombros','BÃ­ceps','TrÃ­ceps','Core'].map(g => (
                <span key={g} className={`muscle-pill ${exFilter===g?'active':''}`} onClick={() => setExFilter(g)}>{g}</span>
              ))}
            </div>

            <div style={{maxHeight:260,overflowY:'auto',display:'flex',flexDirection:'column',gap:6,paddingRight:4}}>
              {filtEx.map(e => (
                <div key={e.id} className={`exercise-card ${form.exercises.includes(e.id)?'selected':''}`} onClick={() => toggleEx(e.id)}>
                  <div className="exercise-icon" style={{width:34,height:34,fontSize:16}}>{e.icon}</div>
                  <div className="exercise-info"><div className="exercise-name" style={{fontSize:13}}>{e.name}</div><div className="exercise-meta">{e.muscle}</div></div>
                  {form.exercises.includes(e.id) && <Icon name="check" size={16} color="var(--orange)"/>}
                </div>
              ))}
            </div>

            <div className="divider"/>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={() => setShowModal(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={saveWorkout} disabled={!form.name.trim()}>
                {editing ? 'Guardar cambios' : 'Crear rutina'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// âââ SESSION ââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function Session({ activeWorkout, setActiveWorkout, setPage, onSessionEnd }) {
  const [sets, setSets] = useState(() => {
    if (!activeWorkout) return {};
    const init = {};
    activeWorkout.exercises.forEach(id => {
      init[id] = [{ reps:'', weight:'', done:false }, { reps:'', weight:'', done:false }, { reps:'', weight:'', done:false }];
    });
    return init;
  });
  const [startTime] = useState(Date.now());
  const [elapsed, setElapsed] = useState(0);
  const [restTimer, setRestTimer] = useState(null);
  const [restLeft, setRestLeft] = useState(0);
  const [notes, setNotes] = useState('');
  const [finishing, setFinishing] = useState(false);

  function updateSet(exId, setIdx, field, val) {
    setSets(prev => ({
      ...prev,
      [exId]: prev[exId].map((s, i) => i===setIdx ? {...s, [field]: val} : s)
    }));
  }
  function toggleDone(exId, setIdx) {
    setSets(prev => {
      const updated = { ...prev, [exId]: prev[exId].map((s,i) => i===setIdx ? {...s,done:!s.done} : s) };
      if (!prev[exId][setIdx].done) { setRestLeft(90); }

    });
  }
  function addSet(exId) {
    setSets(prev => ({ ...prev, [exId]: [...prev[exId], {reps:'',weight:'',done:false}] }));

  function removeSet(exId) {
    setSets(prev => ({ ...prev, [exId]: prev[exId].slice(0,-1) }));
  }

  const completedSets = Object.values(sets).flat().filter(s=>s.done).length;

  function finishSession() {
    let totalVol = 0;
    Object.values(sets).forEach(exSets => {

      {finishing && (

// âââ UTILS ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function formatDuration(ms) {
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const h = Math.floor(m/60);
  if (h > 0) return `${h}h ${m%60}m`;
  return `${m}:${String(s%60).padStart(2,'0')}`;
}
function calcStreak(history) {
  if (!history.length) return 0;
  const dates = [...new Set(history.map(h => new Date(h.date).toDateString()))].map(d=>new Date(d)).sort((a,b)=>b-a);
  let streak = 0; let cur = new Date(); cur.setHours(0,0,0,0);
  for (let d of dates) {
    d.setHours(0,0,0,0);
    const diff = Math.round((cur-d)/(1000*60*60*24));
    if (diff <= 1) { streak++; cur = new Date(d); cur.setDate(cur.getDate()-1); }
    else break;
  }
  return streak;
}
function getWeekData(history) {
  const days = ['Dom','Lun','Mar','MiÃ©','Jue','Vie','SÃ¡b'];
  const counts = {};
  history.forEach(h => {
    const d = new Date(h.date);
    const now = new Date();
    const diff = Math.round((now-d)/(1000*60*60*24));
    if (diff < 7) {
      const lbl = days[d.getDay()];
      counts[lbl] = (counts[lbl]||0)+1;
    }
  });
  return days.map(d => ({ day:d, sesiones: counts[d]||0 }));
}
