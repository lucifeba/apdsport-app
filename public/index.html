  <style>
    :root {
      --bg: #0A0A0A;
      --bg2: #111111;
      --card: #161616;
      --card2: #1E1E1E;
      --border: #2A2A2A;
      --orange: #F97316;
      --orange2: #EA6A0A;
      --orange-dim: rgba(249,115,22,0.15);
      --white: #FFFFFF;
      --gray: #888888;
      --gray2: #555555;
      --green: #22C55E;
      --red: #EF4444;
      --blue: #3B82F6;
      --text: #F1F1F1;
      --text2: #AAAAAA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Layout */
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px; min-height: 100vh; background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 100;
    }
    .main { margin-left: 240px; flex: 1; min-height: 100vh; }

    /* Sidebar */
    .sidebar-logo {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo-text {
      font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
      color: var(--white);
    }
    .logo-text span { color: var(--orange); }
    .logo-sub { font-size: 10px; color: var(--gray); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
    .nav-section { padding: 12px 12px 0; }
    .nav-label { font-size: 10px; color: var(--gray2); letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 8px 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      color: var(--gray); font-size: 14px; font-weight: 500;
      transition: all 0.15s; margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--card); color: var(--text); }
    .nav-item.active { background: var(--orange-dim); color: var(--orange); }
    .nav-item svg { flex-shrink: 0; }
    .sidebar-footer {
      margin-top: auto; padding: 16px;
      border-top: 1px solid var(--border);
    }
    .version-badge {
      font-size: 11px; color: var(--gray2);
      text-align: center;
    }

    /* Page */
    .page { padding: 32px 36px; max-width: 1200px; }
    .page-header { margin-bottom: 28px; }
    .page-title { font-size: 28px; font-weight: 800; color: var(--white); }
    .page-sub { font-size: 14px; color: var(--gray); margin-top: 4px; }

    /* Cards */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
    }
    .card-title { font-size: 13px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

    /* Stat cards */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
    }
    .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--white); }
    .stat-label { font-size: 13px; color: var(--gray); margin-top: 2px; }
    .stat-delta { font-size: 12px; color: var(--green); margin-top: 4px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 18px; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--orange); color: #fff; }
    .btn-primary:hover { background: var(--orange2); }
    .btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-ghost { background: transparent; color: var(--gray); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--gray2); }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-success { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-xs { padding: 4px 10px; font-size: 12px; }
    .btn-icon { padding: 8px; border-radius: 8px; }

    /* Inputs */
    input, select, textarea {
      background: var(--card2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 10px 12px;
      font-size: 14px; width: 100%;
      transition: border-color 0.15s; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--orange); }
    input::placeholder { color: var(--gray2); }
    select option { background: var(--card2); }
    label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 5px; }
    .form-group { margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Tags / Badges */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-orange { background: var(--orange-dim); color: var(--orange); }
    .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-gray { background: var(--card2); color: var(--gray); }

    /* Muscle group pill */
    .muscle-pill {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      border: 1px solid transparent; transition: all 0.15s;
      background: var(--card2); color: var(--gray);
    }
    .muscle-pill:hover { border-color: var(--orange); color: var(--orange); }
    .muscle-pill.active { background: var(--orange-dim); color: var(--orange); border-color: var(--orange); }

    /* Exercise card */
    .exercise-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: all 0.15s;
    }
    .exercise-card:hover { border-color: var(--orange); background: var(--card2); }
    .exercise-card.selected { border-color: var(--orange); background: var(--orange-dim); }
    .exercise-icon {
      width: 42px; height: 42px; border-radius: 10px;
      background: var(--card2); display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .exercise-info { flex: 1; min-width: 0; }
    .exercise-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .exercise-meta { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .exercises-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }

    /* Workout card */
    .workout-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; cursor: pointer;
      transition: all 0.15s;
    }
    .workout-card:hover { border-color: var(--orange); }
    .workout-card-name { font-size: 16px; font-weight: 700; color: var(--white); }
    .workout-card-meta { font-size: 13px; color: var(--gray); margin-top: 6px; }
    .workout-exercises-preview { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .workouts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

    /* Session */
    .session-exercise {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; margin-bottom: 16px;
    }
    .session-exercise-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .session-exercise-name { font-size: 15px; font-weight: 700; color: var(--white); }
    .sets-table { width: 100%; border-collapse: collapse; }
    .sets-table th { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; padding: 0 8px 8px; text-align: left; }
    .sets-table td { padding: 6px 8px; }
    .sets-table tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
    .set-input { width: 80px; text-align: center; padding: 7px 8px; }
    .set-number { font-size: 13px; color: var(--gray); font-weight: 600; }
    .set-done { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: none; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: var(--card2); }
    .set-done.done { background: rgba(34,197,94,0.2); }

    /* Timer */
    .timer-bar {
      position: fixed; top: 0; left: 240px; right: 0;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 12px 36px; display: flex; align-items: center; justify-content: space-between;
      z-index: 50;
    }
    .timer-text { font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--orange); }
    .timer-label { font-size: 12px; color: var(--gray); }

    /* Progress */
    .chart-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px;
    }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 20px;
    }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; width: 100%;
      max-width: 560px; max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 20px; font-weight: 800; color: var(--white); margin-bottom: 20px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      font-size: 14px; color: var(--text);
      z-index: 300; animation: slideUp 0.2s ease;
      display: flex; align-items: center; gap: 10px;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* History list */
    .history-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 16px;
    }
    .history-date { font-size: 12px; color: var(--gray); min-width: 80px; }
    .history-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .history-stats { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .history-volume { font-size: 20px; font-weight: 800; color: var(--orange); min-width: 80px; text-align: right; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--gray);
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state-title { font-size: 18px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
    .empty-state p { font-size: 14px; max-width: 300px; margin: 0 auto 20px; }

    /* Search bar */
    .search-bar { position: relative; }
    .search-bar input { padding-left: 36px; }
    .search-bar svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--gray); }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* Responsive */
    @media (max-width: 900px) {
      .sidebar { width: 60px; }
      .sidebar-logo, .nav-label, .nav-item span, .logo-sub, .sidebar-footer { display: none; }
      .nav-item { justify-content: center; padding: 12px; }
      .main { margin-left: 60px; }
      .timer-bar { left: 60px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
      .page { padding: 20px 16px; }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 2500); return () => clearTimeout(t); }, []);
  return <div className="toast"><span>✅</span>{msg}</div>;
}

// ─── WORKOUTS ───────────────────────────────────────────────────────
function Workouts({ workouts, setWorkouts, setPage, setActiveWorkout }) {
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name:'', description:'', color:'#F97316', exercises:[] });
  const [exSearch, setExSearch] = useState('');
  const [exFilter, setExFilter] = useState('Todos');
  const [toast, setToast] = useState('');

  function openNew() {
    setEditing(null);
    setForm({ name:'', description:'', color:'#F97316', exercises:[] });
    setShowModal(true);
  }
  function openEdit(w) {
    setEditing(w.id);
    setForm({ name:w.name, description:w.description, color:w.color, exercises:[...w.exercises] });
    setShowModal(true);
  }
  function saveWorkout() {
    if (!form.name.trim()) return;
    if (editing) {
      const updated = workouts.map(w => w.id===editing ? {...w,...form} : w);
      setWorkouts(updated);
      save('workouts', updated);
    } else {
      const nw = [...workouts, { ...form, id: 'w'+Date.now() }];
      setWorkouts(nw);
      save('workouts', nw);
    }
    setShowModal(false);
    setToast(editing ? 'Rutina actualizada ✔' : 'Rutina creada ✔');
  }
  function deleteWorkout(id) {
    const updated = workouts.filter(w => w.id !== id);
    setWorkouts(updated);
    save('workouts', updated);
  }
  function toggleEx(id) {
    setForm(f => ({
      ...f,
      exercises: f.exercises.includes(id) ? f.exercises.filter(e=>e!==id) : [...f.exercises, id]
    }));
  }
  function startWorkout(w) {
    setActiveWorkout(w);
    setPage('session');
  }

  const filtEx = EXERCISES.filter(e =>
    (exFilter==='Todos'||e.muscle===exFilter) &&
    e.name.toLowerCase().includes(exSearch.toLowerCase())
  );

  const COLORS = ['#F97316','#3B82F6','#22C55E','#A855F7','#EC4899','#EAB308'];

  return (
    <div className="page">
      {toast && <Toast msg={toast} onClose={() => setToast('')}/>}
      <div className="page-header">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div className="page-title">Mis Rutinas</div>
            <div className="page-sub">{workouts.length} rutinas guardadas</div>
          </div>
          <button className="btn btn-primary" onClick={openNew}><Icon name="plus" size={15}/>Nueva Rutina</button>
        </div>
      </div>

      {workouts.length === 0 ? (
        <div className="empty-state">
          <div className="empty-state-icon">📋</div>
          <div className="empty-state-title">Sin rutinas todavía</div>
          <p>Crea tu primera rutina personalizada con los ejercicios que quieras.</p>
          <button className="btn btn-primary" onClick={openNew}><Icon name="plus" size={15}/>Crear Rutina</button>
        </div>
      ) : (
        <div className="workouts-grid">
          {workouts.map(w => {
            const exs = w.exercises.map(id => EXERCISES.find(e=>e.id===id)).filter(Boolean);
            return (
              <div key={w.id} className="workout-card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                  <div style={{width:4,height:'100%',background:w.color,borderRadius:4,alignSelf:'stretch',marginRight:4,marginLeft:-4}}/>
                  <div style={{flex:1}}>
                    <div className="workout-card-name">{w.name}</div>
                    <div className="workout-card-meta">{w.description}</div>
                  </div>
                </div>
                <div className="workout-exercises-preview">
                  {exs.slice(0,5).map(e => <span key={e.id} className="badge badge-gray">{e.icon} {e.name}</span>)}
                  {exs.length > 5 && <span className="badge badge-gray">+{exs.length-5}</span>}
                </div>
                <div className="divider"/>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={() => startWorkout(w)}>
                    <Icon name="play" size={13}/>Iniciar
                  </button>
                  <button className="btn btn-secondary btn-sm btn-icon" onClick={() => openEdit(w)}><Icon name="edit" size={14}/></button>
                  <button className="btn btn-danger btn-sm btn-icon" onClick={() => deleteWorkout(w.id)}><Icon name="trash" size={14}/></button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {showModal && (
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth:640}}>
            <div className="modal-title">{editing ? 'Editar Rutina' : 'Nueva Rutina'}</div>

            <div className="form-row">
              <div className="form-group">
                <label>Nombre de la rutina *</label>
                <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Ej: Empuje — Lunes"/>
              </div>
              <div className="form-group">
                <label>Descripción</label>
                <input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Ej: Pecho, Hombros, Tríceps"/>
              </div>
            </div>

            <div className="form-group">
              <label>Color de la rutina</label>
              <div style={{display:'flex',gap:8}}>
                {COLORS.map(c => (
                  <div key={c} onClick={() => setForm(f=>({...f,color:c}))}
                    style={{width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',
                      border: form.color===c ? '3px solid white' : '3px solid transparent', transition:'all 0.15s'}}/>
                ))}
              </div>
            </div>

            <div className="divider"/>
            <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:10}}>
              Ejercicios seleccionados: <span style={{color:'var(--orange)'}}>{form.exercises.length}</span>
            </div>

            <div className="search-bar" style={{marginBottom:8}}>
              <Icon name="search" size={14} color="var(--gray)"/>
              <input value={exSearch} onChange={e=>setExSearch(e.target.value)} placeholder="Buscar ejercicio..."/>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:10}}>
              {['Todos','Pecho','Espalda','Piernas','Hombros','Bíceps','Tríceps','Core'].map(g => (
                <span key={g} className={`muscle-pill ${exFilter===g?'active':''}`} onClick={() => setExFilter(g)}>{g}</span>
              ))}
            </div>

            <div style={{maxHeight:260,overflowY:'auto',display:'flex',flexDirection:'column',gap:6,paddingRight:4}}>
              {filtEx.map(e => (
                <div key={e.id} className={`exercise-card ${form.exercises.includes(e.id)?'selected':''}`} onClick={() => toggleEx(e.id)}>
                  <div className="exercise-icon" style={{width:34,height:34,fontSize:16}}>{e.icon}</div>
                  <div className="exercise-info"><div className="exercise-name" style={{fontSize:13}}>{e.name}</div><div className="exercise-meta">{e.muscle}</div></div>
                  {form.exercises.includes(e.id) && <Icon name="check" size={16} color="var(--orange)"/>}
                </div>
              ))}
            </div>

            <div className="divider"/>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={() => setShowModal(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={saveWorkout} disabled={!form.name.trim()}>
                {editing ? 'Guardar cambios' : 'Crear rutina'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SESSION ────────────────────────────────────────────────────────
function Session({ activeWorkout, setActiveWorkout, setPage, onSessionEnd }) {
  const [sets, setSets] = useState(() => {
    if (!activeWorkout) return {};
    const init = {};
    activeWorkout.exercises.forEach(id => {
      init[id] = [{ reps:'', weight:'', done:false }, { reps:'', weight:'', done:false }, { reps:'', weight:'', done:false }];
    });
    return init;
  });
  const [startTime] = useState(Date.now());
  const [elapsed, setElapsed] = useState(0);
  const [restTimer, setRestTimer] = useState(null);
  const [restLeft, setRestLeft] = useState(0);
  const [notes, setNotes] = useState('');
  const [finishing, setFinishing] = useState(false);

  useEffect(() => {
    const t = setInterval(() => setElapsed(Date.now() - startTime), 1000);
    return () => clearInterval(t);
  }, [startTime]);

  useEffect(() => {
    if (restLeft > 0) {
      const t = setTimeout(() => setRestLeft(r => r - 1), 1000);
      return () => clearTimeout(t);
    }
  }, [restLeft]);

  if (!activeWorkout) {
    return (
      <div className="page">
        <div className="empty-state">
          <div className="empty-state-icon">🏋️</div>
          <div className="empty-state-title">Sin sesión activa</div>
          <p>Ve a "Mis Rutinas" y elige una para comenzar.</p>
          <button className="btn btn-primary" onClick={() => setPage('workouts')}>Ver Rutinas</button>
        </div>
      </div>
    );
  }

  const exercises = activeWorkout.exercises.map(id => EXERCISES.find(e=>e.id===id)).filter(Boolean);

  function updateSet(exId, setIdx, field, val) {
    setSets(prev => ({
      ...prev,
      [exId]: prev[exId].map((s, i) => i===setIdx ? {...s, [field]: val} : s)
    }));
  }
  function toggleDone(exId, setIdx) {
    setSets(prev => {
      const updated = { ...prev, [exId]: prev[exId].map((s,i) => i===setIdx ? {...s,done:!s.done} : s) };
      if (!prev[exId][setIdx].done) { setRestLeft(90); }
      return updated;
    });
  }
  function addSet(exId) {
    setSets(prev => ({ ...prev, [exId]: [...prev[exId], {reps:'',weight:'',done:false}] }));
  }
  function removeSet(exId) {
    setSets(prev => ({ ...prev, [exId]: prev[exId].slice(0,-1) }));
  }

  const completedSets = Object.values(sets).flat().filter(s=>s.done).length;
  const totalSets = Object.values(sets).flat().length;

  function finishSession() {
    let totalVol = 0;
    Object.values(sets).forEach(exSets => {
      exSets.filter(s=>s.done).forEach(s => {
        totalVol += (parseFloat(s.weight)||0) * (parseInt(s.reps)||0);
      });
    });
    const session = {
      id: 'sess'+Date.now(),
      date: new Date().toISOString(),
      workoutName: activeWorkout.name,
      duration: Date.now() - startTime,
      exercises: exercises.map(e => ({
        id: e.id, name: e.name,
        sets: sets[e.id].filter(s=>s.done).map(s=>({reps:parseInt(s.reps)||0, weight:parseFloat(s.weight)||0}))
      })),
      totalVolume: Math.round(totalVol),
      notes
    };
    onSessionEnd(session);
    setActiveWorkout(null);
    setPage('progress');
  }

  return (
    <div style={{paddingTop:60}}>
      <div className="timer-bar">
        <div>
          <div className="timer-label">Sesión activa — {activeWorkout.name}</div>
          <div className="timer-text">{formatDuration(elapsed)}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          {restLeft > 0 && (
            <div style={{background:'var(--orange-dim)',border:'1px solid var(--orange)',borderRadius:8,padding:'8px 14px',textAlign:'center'}}>
              <div style={{fontSize:10,color:'var(--orange)',letterSpacing:1}}>DESCANSO</div>
              <div style={{fontSize:20,fontWeight:800,color:'var(--orange)',fontVariantNumeric:'tabular-nums'}}>{restLeft}s</div>
            </div>
          )}
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:12,color:'var(--gray)'}}>Series hechas</div>
            <div style={{fontSize:20,fontWeight:800,color:'var(--white)'}}>{completedSets}/{totalSets}</div>
          </div>
          <button className="btn btn-success" onClick={() => setFinishing(true)}>Finalizar</button>
        </div>
      </div>

      <div className="page" style={{paddingTop:20}}>
        {exercises.map(ex => (
          <div key={ex.id} className="session-exercise">
            <div className="session-exercise-header">
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:24}}>{ex.icon}</span>
                <div>
                  <div className="session-exercise-name">{ex.name}</div>
                  <div style={{fontSize:12,color:'var(--gray)'}}>{ex.muscle} · {ex.equipment}</div>
                </div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-xs btn-ghost" onClick={() => addSet(ex.id)}>+Serie</button>
                {sets[ex.id]?.length > 1 && <button className="btn btn-xs btn-ghost" onClick={() => removeSet(ex.id)}>−Serie</button>}
              </div>
            </div>
            <table className="sets-table">
              <thead>
                <tr>
                  <th>Serie</th>
                  <th>Peso (kg)</th>
                  <th>Reps</th>
                  <th>✓</th>
                </tr>
              </thead>
              <tbody>
                {sets[ex.id]?.map((s, i) => (
                  <tr key={i} style={{opacity: s.done ? 0.6 : 1}}>
                    <td><span className="set-number">#{i+1}</span></td>
                    <td>
                      <input type="number" className="set-input" value={s.weight}
                        onChange={e=>updateSet(ex.id,i,'weight',e.target.value)}
                        placeholder="0" min="0" step="0.5" disabled={s.done}/>
                    </td>
                    <td>
                      <input type="number" className="set-input" value={s.reps}
                        onChange={e=>updateSet(ex.id,i,'reps',e.target.value)}
                        placeholder="0" min="0" disabled={s.done}/>
                    </td>
                    <td>
                      <button className={`set-done ${s.done?'done':''}`} onClick={() => toggleDone(ex.id,i)}>
                        {s.done ? '✅' : '○'}
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ))}

        <div className="form-group" style={{marginTop:8}}>
          <label>Notas de la sesión (opcional)</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} placeholder="Cómo te has sentido, observaciones..."/>
        </div>
      </div>

      {finishing && (
        <div className="modal-overlay">
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-title">¿Finalizar sesión? 🎯</div>
            <div style={{fontSize:14,color:'var(--text2)',marginBottom:16}}>
              Has completado <strong style={{color:'var(--orange)'}}>{completedSets}</strong> series en <strong style={{color:'var(--white)'}}>{formatDuration(elapsed)}</strong>.
            </div>
            <div style={{background:'var(--card2)',borderRadius:10,padding:'12px 16px',marginBottom:20}}>
              {exercises.map(e => {
                const done = sets[e.id]?.filter(s=>s.done).length || 0;
                return (
                  <div key={e.id} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:13}}>
                    <span style={{color:'var(--text2)'}}>{e.name}</span>
                    <span style={{color: done>0 ? 'var(--green)' : 'var(--gray)'}}>{done}/{sets[e.id]?.length} series</span>
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={() => setFinishing(false)}>Continuar</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={finishSession}>Guardar sesión</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── PROGRESS ───────────────────────────────────────────────────────
function Progress({ history }) {
  const [selEx, setSelEx] = useState(EXERCISES[0].id);
  const ex = EXERCISES.find(e=>e.id===selEx);

  // Volume over time (last 14 sessions)
  const volData = history.slice(-14).map((h,i) => ({
    name: new Date(h.date).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'}),
    Volumen: h.totalVolume,
  }));

  // Sessions per muscle group
  const muscleCount = {};
  history.forEach(h => {
    h.exercises?.forEach(e => {
      const ex = EXERCISES.find(x=>x.id===e.id);
      if (ex) muscleCount[ex.muscle] = (muscleCount[ex.muscle]||0)+1;
    });
  });
  const muscleData = Object.entries(muscleCount).map(([muscle, count]) => ({muscle, count})).sort((a,b)=>b.count-a.count);

  // PR tracking for selected exercise
  const prData = history.flatMap(h => {
    const found = h.exercises?.find(e=>e.id===selEx);
    if (!found) return [];
    const maxWeight = Math.max(...(found.sets||[]).map(s=>s.weight||0), 0);
    return maxWeight > 0 ? [{ fecha: new Date(h.date).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'}), Peso: maxWeight }] : [];
  });

  const stats = [
    { label:'Total sesiones', value: history.length, icon:'🏆' },
    { label:'Mejor racha', value: calcStreak(history)+' días', icon:'🔥' },
    { label:'Sesiones este mes', value: history.filter(h => new Date(h.date).getMonth()===new Date().getMonth()).length, icon:'📅' },
    { label:'Volumen medio', value: history.length ? Math.round(history.reduce((s,h)=>s+(h.totalVolume||0),0)/history.length)+'kg' : '0kg', icon:'⚖️' },
  ];

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">Progreso & Estadísticas</div>
        <div className="page-sub">Tu evolución a lo largo del tiempo</div>
      </div>

      <div className="stats-grid" style={{marginBottom:24}}>
        {stats.map(s => (
          <div key={s.label} className="stat-card">
            <div style={{fontSize:24,marginBottom:6}}>{s.icon}</div>
            <div className="stat-value" style={{fontSize:22}}>{s.value}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>

      <div className="charts-grid">
        <div className="chart-card">
          <div className="card-title">Volumen por sesión (kg)</div>
          {volData.length > 0 ? (
            <ResponsiveContainer width="100%" height={200}>
              <LineChart data={volData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2A2A2A" vertical={false}/>
                <XAxis dataKey="name" tick={{fill:'#888',fontSize:11}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fill:'#888',fontSize:11}} axisLine={false} tickLine={false}/>
                <Tooltip contentStyle={{background:'#1E1E1E',border:'1px solid #2A2A2A',borderRadius:8,color:'#fff'}}/>
                <Line type="monotone" dataKey="Volumen" stroke="#F97316" strokeWidth={2.5} dot={{fill:'#F97316',r:4}} activeDot={{r:6}}/>
              </LineChart>
            </ResponsiveContainer>
          ) : <div style={{color:'var(--gray)',textAlign:'center',padding:'40px 0',fontSize:13}}>Sin datos aún. ¡Completa tu primer entreno!</div>}
        </div>

        <div className="chart-card">
          <div className="card-title">Músculos más trabajados</div>
          {muscleData.length > 0 ? (
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={muscleData.slice(0,6)} layout="vertical" barSize={14}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2A2A2A" horizontal={false}/>
                <XAxis type="number" tick={{fill:'#888',fontSize:11}} axisLine={false} tickLine={false}/>
                <YAxis dataKey="muscle" type="category" tick={{fill:'#aaa',fontSize:12}} axisLine={false} tickLine={false} width={70}/>
                <Tooltip contentStyle={{background:'#1E1E1E',border:'1px solid #2A2A2A',borderRadius:8,color:'#fff'}}/>
                <Bar dataKey="count" fill="#3B82F6" radius={[0,4,4,0]}/>
              </BarChart>
            </ResponsiveContainer>
          ) : <div style={{color:'var(--gray)',textAlign:'center',padding:'40px 0',fontSize:13}}>Sin datos aún</div>}
        </div>
      </div>

      <div className="chart-card" style={{marginTop:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div className="card-title" style={{marginBottom:0}}>Evolución de peso — {ex?.name}</div>
          <select style={{width:'auto'}} value={selEx} onChange={e=>setSelEx(e.target.value)}>
            {EXERCISES.filter(e=>e.type==='Fuerza').map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
        </div>
        {prData.length > 0 ? (
          <ResponsiveContainer width="100%" height={200}>
            <LineChart data={prData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2A2A2A" vertical={false}/>
              <XAxis dataKey="fecha" tick={{fill:'#888',fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:'#888',fontSize:11}} axisLine={false} tickLine={false}/>
              <Tooltip contentStyle={{background:'#1E1E1E',border:'1px solid #2A2A2A',borderRadius:8,color:'#fff'}} formatter={v=>[v+'kg','Peso']}/>
              <Line type="monotone" dataKey="Peso" stroke="#22C55E" strokeWidth={2.5} dot={{fill:'#22C55E',r:4}}/>
            </LineChart>
          </ResponsiveContainer>
        ) : <div style={{color:'var(--gray)',textAlign:'center',padding:'40px 0',fontSize:13}}>Completa sesiones con este ejercicio para ver tu progreso</div>}
      </div>

      <div className="card" style={{marginTop:20}}>
        <div className="card-title" style={{marginBottom:12}}>Historial completo</div>
        {history.length === 0 ? (
          <div style={{textAlign:'center',padding:'20px',color:'var(--gray)',fontSize:13}}>No hay sesiones registradas aún</div>
        ) : [...history].reverse().map(h => (
          <div key={h.id} className="history-item">
            <div>
              <div style={{fontSize:11,color:'var(--orange)',fontWeight:600}}>{new Date(h.date).toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
              <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginTop:2}}>{h.workoutName}</div>
              <div style={{fontSize:12,color:'var(--gray)',marginTop:1}}>{h.exercises?.length} ejercicios · {formatDuration(h.duration)}</div>
              {h.notes && <div style={{fontSize:12,color:'var(--text2)',marginTop:4,fontStyle:'italic'}}>"{h.notes}"</div>}
            </div>
            <div style={{marginLeft:'auto',textAlign:'right'}}>
              <div style={{fontSize:20,fontWeight:800,color:'var(--orange)'}}>{h.totalVolume}kg</div>
              <div style={{fontSize:11,color:'var(--gray)'}}>volumen</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── UTILS ──────────────────────────────────────────────────────────
function formatDuration(ms) {
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const h = Math.floor(m/60);
  if (h > 0) return `${h}h ${m%60}m`;
  return `${m}:${String(s%60).padStart(2,'0')}`;
}
function calcStreak(history) {
  if (!history.length) return 0;
  const dates = [...new Set(history.map(h => new Date(h.date).toDateString()))].map(d=>new Date(d)).sort((a,b)=>b-a);
  let streak = 0; let cur = new Date(); cur.setHours(0,0,0,0);
  for (let d of dates) {
    d.setHours(0,0,0,0);
    const diff = Math.round((cur-d)/(1000*60*60*24));
    if (diff <= 1) { streak++; cur = new Date(d); cur.setDate(cur.getDate()-1); }
    else break;
  }
  return streak;
}
function getWeekData(history) {
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const counts = {};
  history.forEach(h => {
    const d = new Date(h.date);
    const now = new Date();
    const diff = Math.round((now-d)/(1000*60*60*24));
    if (diff < 7) {
      const lbl = days[d.getDay()];
      counts[lbl] = (counts[lbl]||0)+1;
    }
  });
  return days.map(d => ({ day:d, sesiones: counts[d]||0 }));
}

// ─── APP ────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('dashboard');
  const [workouts, setWorkouts] = useState(() => load('workouts', INITIAL_WORKOUTS));
  const [history, setHistory] = useState(() => load('history', []));
  const [activeWorkout, setActiveWorkout] = useState(null);

  function onSessionEnd(session) {
    const newHistory = [...history, session];
    setHistory(newHistory);
    save('history', newHistory);
  }

  const pages = {
    dashboard: <Dashboard history={history} workouts={workouts} setPage={setPage}/>,
    exercises: <Exercises/>,
    workouts: <Workouts workouts={workouts} setWorkouts={setWorkouts} setPage={setPage} setActiveWorkout={setActiveWorkout}/>,
    session: <Session activeWorkout={activeWorkout} setActiveWorkout={setActiveWorkout} setPage={setPage} onSessionEnd={onSessionEnd}/>,
    progress: <Progress history={history}/>,
  };

  return (
    <div className="layout">
      <Sidebar page={page} setPage={setPage} activeSession={!!activeWorkout}/>
      <div className="main">
        {pages[page]}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
