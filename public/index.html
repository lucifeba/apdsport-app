<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>APD SPORT вҖ” Plataforma de Entrenamiento</title>
<link rel="icon" href="/icon-192.png"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2f3b69;--primary-dark:#1e2847;--primary-mid:#3d4f8a;
  --primary-light:#6d7696;--primary-lighter:#acb1c3;
  --bg:#f0f2f8;--bg2:#e8eaf2;--surface:#fff;--surface2:#f8f9fc;
  --accent:#fdca00;--accent-dark:#e6b800;
  --green:#2ccb1a;--red:#e53e3e;
  --text:#1a1a2e;--text2:#4a5568;--text3:#8890b0;
  --border:#dde0ec;
  --shadow:0 2px 12px rgba(47,59,105,.12);
  --shadow-lg:0 8px 32px rgba(47,59,105,.18);
  --radius:10px;--radius-lg:16px;
  --sidebar:240px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* LAYOUT */
.app-shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--primary-dark);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:.25s}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sidebar-logo img{width:40px;height:40px;border-radius:50%;background:#fff;padding:2px}
.sidebar-logo-text{font-size:13px;font-weight:700;letter-spacing:.5px;line-height:1.3}
.sidebar-logo-text span{color:var(--accent);display:block;font-size:11px;font-weight:500;letter-spacing:1px}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;border-radius:0;transition:.15s;font-size:14px;font-weight:500;color:rgba(255,255,255,.7);border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(253,202,0,.12);color:var(--accent);border-left-color:var(--accent)}
.nav-icon{width:18px;text-align:center}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,.1)}
.logout-btn{width:100%;padding:9px;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.7);border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:500;transition:.15s;display:flex;align-items:center;gap:8px;justify-content:center}
.logout-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.main-content{margin-left:var(--sidebar);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:700;color:var(--primary)}
.topbar-user{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2)}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.page-body{padding:28px;flex:1}
/* CARDS */
.card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:20px}
.card-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:16px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:20px;display:flex;align-items:center;gap:16px}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-val{font-size:26px;font-weight:800;color:var(--primary)}
.stat-label{font-size:12px;color:var(--text3);font-weight:500;margin-top:2px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius);border:none;cursor:pointer;font-size:14px;font-weight:600;transition:.15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-mid)}
.btn-accent{background:var(--accent);color:var(--primary-dark)}
.btn-accent:hover{background:var(--accent-dark)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg2)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#c53030}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-icon{width:34px;height:34px;padding:0;border-radius:8px;justify-content:center}
/* TABLES */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
td{padding:12px 14px;font-size:14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
/* FORMS */
.form-group{margin-bottom:16px}
label.form-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
input.form-input,select.form-input,textarea.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);background:var(--surface);transition:.15s;outline:none;font-family:inherit}
input.form-input:focus,select.form-input:focus,textarea.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(47,59,105,.08)}
textarea.form-input{resize:vertical;min-height:80px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:700;color:var(--primary)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);padding:4px;line-height:1;border-radius:6px}
.modal-close:hover{background:var(--bg2)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-blue{background:rgba(47,59,105,.1);color:var(--primary)}
.badge-green{background:rgba(44,203,26,.12);color:#1a8a12}
.badge-yellow{background:rgba(253,202,0,.2);color:#8a6800}
.badge-red{background:rgba(229,62,62,.1);color:var(--red)}
.badge-gray{background:var(--bg2);color:var(--text3)}
/* EXERCISE CARDS */
.exercise-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.exercise-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;gap:10px;transition:.15s;border:2px solid transparent}
.exercise-card:hover{border-color:var(--primary-lighter);transform:translateY(-1px)}
.exercise-card-img{width:100%;height:130px;object-fit:cover;border-radius:8px;background:var(--bg2)}
.exercise-card-img-placeholder{width:100%;height:130px;border-radius:8px;background:linear-gradient(135deg,var(--bg2),var(--primary-lighter));display:flex;align-items:center;justify-content:center;font-size:36px}
.exercise-card-name{font-size:15px;font-weight:700;color:var(--primary)}
.exercise-card-meta{display:flex;gap:6px;flex-wrap:wrap}
.exercise-card-actions{display:flex;gap:6px;margin-top:auto}
/* WORKOUT */
.workout-exercise{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;border-left:4px solid var(--primary)}
.workout-exercise.done{border-left-color:var(--green);opacity:.7}
.sets-grid{display:grid;grid-template-columns:auto 1fr 1fr 1fr auto;gap:8px;align-items:center;margin-top:12px}
.sets-header{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase}
.set-input{padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;width:100%;text-align:center;outline:none}
.set-input:focus{border-color:var(--primary)}
.set-check{width:28px;height:28px;cursor:pointer;accent-color:var(--primary)}
/* WIZARD */
.wizard-step{text-align:center;padding:8px 0}
.wizard-progress{display:flex;gap:6px;justify-content:center;margin-bottom:24px}
.wizard-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:.2s}
.wizard-dot.active{background:var(--primary)}
.wizard-dot.done{background:var(--green)}
.wizard-q{font-size:19px;font-weight:700;color:var(--primary);margin-bottom:8px}
.wizard-hint{font-size:14px;color:var(--text3);margin-bottom:24px}
.option-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:8px}
.option-btn{padding:14px 10px;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;text-align:center;transition:.15s;font-size:13px;font-weight:600;color:var(--text2)}
.option-btn:hover{border-color:var(--primary-lighter);background:var(--surface2)}
.option-btn.selected{border-color:var(--primary);background:rgba(47,59,105,.06);color:var(--primary)}
.option-emoji{font-size:22px;display:block;margin-bottom:6px}
/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 60%,var(--primary-mid) 100%)}
.login-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:40px;width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo img{width:80px;height:80px;border-radius:50%}
.login-logo h1{font-size:22px;font-weight:800;color:var(--primary);margin-top:12px}
.login-logo p{font-size:13px;color:var(--text3);margin-top:4px}
/* FIREBASE SETUP */
.setup-screen{min-height:100vh;background:linear-gradient(135deg,var(--primary-dark),var(--primary));display:flex;align-items:center;justify-content:center;padding:20px}
.setup-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:32px;max-width:640px;width:100%}
.setup-step{background:var(--bg2);border-radius:var(--radius);padding:14px 18px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start}
.setup-step-num{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.setup-step-text{font-size:13px;color:var(--text2);line-height:1.5}
.setup-step-text strong{color:var(--primary)}
.setup-step-text a{color:var(--primary);font-weight:600}
/* SEARCH */
.search-bar{position:relative;max-width:320px}
.search-bar input{padding-left:36px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px}
/* FILTERS */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer;transition:.15s;color:var(--text2)}
.filter-chip:hover,.filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
/* ATHLETE CARDS */
.athlete-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.athlete-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:20px;display:flex;flex-direction:column;gap:12px}
.athlete-card-header{display:flex;align-items:center;gap:12px}
.athlete-avatar{width:46px;height:46px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;flex-shrink:0}
/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state-icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab{padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
/* PROGRESS RINGS / BARS */
.progress-bar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:4px;transition:.3s}
/* FILE UPLOAD */
.file-upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:.15s;color:var(--text3)}
.file-upload-zone:hover{border-color:var(--primary);background:rgba(47,59,105,.03)}
/* FEEDBACK */
.feedback-item{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:18px;margin-bottom:12px;border-left:4px solid var(--accent)}
.feedback-item.read{border-left-color:var(--border);opacity:.75}
/* TIMER */
.rest-timer{background:var(--primary);color:#fff;border-radius:var(--radius-lg);padding:16px;text-align:center;margin:12px 0}
.timer-val{font-size:36px;font-weight:800;font-variant-numeric:tabular-nums}
/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-header h2{font-size:20px;font-weight:800;color:var(--primary)}
/* ROUTINE BUILDER */
.routine-exercise-row{display:grid;grid-template-columns:1fr auto auto auto auto auto;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.routine-exercise-row:last-child{border-bottom:none}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--primary-lighter);border-radius:3px}
/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:60px}
  .sidebar-logo-text,.nav-item span{display:none}
  .main-content{margin-left:60px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .page-body{padding:16px}
}
/* CHART CONTAINER */
.chart-container{width:100%;height:260px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;
const {LineChart,BarChart,Bar,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer} = Recharts;

/* в”Җв”Җв”Җ FIREBASE HELPERS в”Җв”Җв”Җ */
let db = null, storage = null;
function initFirebase(cfg){
  try{
    if(firebase.apps.length) firebase.apps.forEach(a=>a.delete());
    const app = firebase.initializeApp(cfg);
    db = firebase.firestore(app);
    storage = firebase.storage(app);
    return true;
  } catch(e){ console.error(e); return false; }
}

/* в”Җв”Җв”Җ DB LAYER в”Җв”Җв”Җ */
const DB = {
  async getAll(col){ const s=await db.collection(col).get(); return s.docs.map(d=>({id:d.id,...d.data()})); },
  async getWhere(col,field,op,val){ const s=await db.collection(col).where(field,op,val).get(); return s.docs.map(d=>({id:d.id,...d.data()})); },
  async add(col,data){ const r=await db.collection(col).add({...data,createdAt:Date.now()}); return r.id; },
  async set(col,id,data){ await db.collection(col).doc(id).set({...data,updatedAt:Date.now()}); },
  async update(col,id,data){ await db.collection(col).doc(id).update({...data,updatedAt:Date.now()}); },
  async remove(col,id){ await db.collection(col).doc(id).delete(); },
  async uploadFile(path,file){
    const ref=storage.ref(path);
    await ref.put(file);
    return await ref.getDownloadURL();
  }
};

/* в”Җв”Җв”Җ DEFAULT EXERCISES (72) в”Җв”Җв”Җ */

  {id:'de2',name:'Press de banca inclinado',category:'fuerza',muscle:'pecho',muscle2:'hombros,trГӯceps',equipment:'mancuernas',difficulty:'intermedio',desc:'Enfatiza la parte superior del pecho. Banco a 30-45 grados.',recs:'3x10-12',isDefault:true},
  {id:'de3',name:'Press de banca declinado',category:'fuerza',muscle:'pecho',muscle2:'trГӯceps',equipment:'barra',difficulty:'intermedio',desc:'Trabaja la parte inferior del pecho.',recs:'3x10-12',isDefault:true},
  {id:'de4',name:'Aperturas con mancuernas',category:'hipertrofia',muscle:'pecho',muscle2:'',equipment:'mancuernas',difficulty:'principiante',desc:'Aislamiento del pecho con rango completo de movimiento.',recs:'3x12-15',isDefault:true},
  {id:'de5',name:'Flexiones',category:'funcional',muscle:'pecho',muscle2:'trГӯceps,core',equipment:'sin_equipo',difficulty:'principiante',desc:'Ejercicio de peso corporal. MantГ¬n el cuerpo recto durante todo el movimiento.',recs:'3x15-20',isDefault:true},
  {id:'de6',name:'Fondos en paralelas',category:'fuerza',muscle:'pecho',muscle2:'trГӯceps,hombros',equipment:'sin_equipo',difficulty:'intermedio',desc:'Inclina el torso para enfatizar el pecho. Desciende con control.',recs:'3x10-12',isDefault:true},
  {id:'de7',name:'Cruces en polea alta',category:'hipertrofia',muscle:'pecho',muscle2:'',equipment:'cables',difficulty:'principiante',desc:'TensiГіn constante en todo el rango. Junta las manos en el centro.',recs:'3x12-15',isDefault:true},
  {id:'de8',name:'Dominadas',category:'fuerza',muscle:'espalda',muscle2:'bГӯceps',equipment:'sin_equipo',difficulty:'avanzado',desc:'Agarre prono, ancho. Sube hasta que la barbilla supere la barra.',recs:'4x6-8',isDefault:true},
  {id:'de9',name:'Remo con barra',category:'fuerza',muscle:'espalda',muscle2:'bГӯceps,hombros',equipment:'barra',difficulty:'intermedio',desc:'Tronco a 45 grados, tira la barra hacia el abdomen con los codos hacia atrГЎs.',recs:'4x8-10',isDefault:true},
  {id:'de10',name:'Remo con mancuerna',category:'fuerza',muscle:'espalda',muscle2:'bГӯceps',equipment:'mancuernas',difficulty:'principiante',desc:'Apoya rodilla y mano en banco. Tira la mancuerna hacia la cadera.',recs:'3x10-12',isDefault:true},
  {id:'de11',name:'JalГіn al pecho',category:'hipertrofia',muscle:'espalda',muscle2:'bГӯceps',equipment:'cables',difficulty:'principiante',desc:'Agarre ancho, tira hacia el pecho. Saca pecho al final del movimiento.',recs:'4x10-12',isDefault:true},
  {id:'de12',name:'Remo en polea baja',category:'hipertrofia',muscle:'espalda',muscle2:'bГӯceps',equipment:'cables',difficulty:'principiante',desc:'Sentado, tira la manilla hacia el abdomen manteniendo la espalda recta.',recs:'3x12-15',isDefault:true},
  {id:'de13',name:'Peso muerto',category:'fuerza',muscle:'espalda',muscle2:'glГәteos,isquios,trapecio',equipment:'barra',difficulty:'avanzado',desc:'El ejercicio compuesto mГЎs completo. Espalda neutra, empuja el suelo.',recs:'4x5-6',isDefault:true},
  {id:'de14',name:'Peso muerto rumano',category:'fuerza',muscle:'isquios',muscle2:'glГәteos,espalda_baja',equipment:'barra',difficulty:'intermedio',desc:'Piernas casi rectas. Baja la barra cerca del cuerpo hasta notar tensiГіn en isquios.',recs:'3x10-12',isDefault:true},

/* в”Җв”Җв”Җ CSV EXPORT в”Җв”Җв”Җ */
function exportCSV(rows, filename){
  const keys = Object.keys(rows[0]);
  const csv = [keys.join(','), ...rows.map(r=>keys.map(k=>'"'+(r[k]||'').toString().replace(/"/g,'""')+'"').join(','))].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,п»ҝ'+encodeURIComponent(csv);
  a.download = filename;
  a.click();
}

/* в”Җв”Җв”Җ MODAL в”Җв”Җв”Җ */
function Modal({open,onClose,title,children,footer,size='md'}){
  if(!open) return null;
  const w = size==='lg'?'760px':size==='xl'?'960px':'560px';
  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal" style={{maxWidth:w}}>
        <div className="modal-header">
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}>Г—</button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

/* в”Җв”Җв”Җ FIREBASE SETUP SCREEN в”Җв”Җв”Җ */
function FirebaseSetup({onReady}){
  const [cfg, setCfg] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function connect(){
    setErr(''); setLoading(true);
    try{
      const parsed = JSON.parse(cfg.trim());
      const ok = initFirebase(parsed);
      if(!ok) throw new Error('No se pudo inicializar Firebase');
      // seed default exercises if empty
      const exSnap = await db.collection('exercises').limit(1).get();
      if(exSnap.empty){
        const batch = db.batch();
        DEFAULT_EXERCISES.forEach(e=>{ const ref=db.collection('exercises').doc(e.id); batch.set(ref,{...e,createdAt:Date.now()}); });
        await batch.commit();
      }
      // seed admin user if no users
      const usSnap = await db.collection('users').where('role','==','admin').limit(1).get();
      if(usSnap.empty){
        await db.collection('users').doc('admin').set({id:'admin',name:'Administrador',username:'admin',password:'admin123',role:'admin',email:'admin@apdsport.com',active:true,createdAt:Date.now()});
      }
      localStorage.setItem('apd_firebase_cfg', JSON.stringify(parsed));
      onReady();
    } catch(e){ setErr('Error: '+e.message); }
    setLoading(false);
  }

  // Try saved config
  useEffect(()=>{
    const saved = localStorage.getItem('apd_firebase_cfg');
    if(saved){
      try{
        const p=JSON.parse(saved);
        const ok=initFirebase(p);
        if(ok) onReady();
      }catch(e){}
    }
  },[]);

  return (
    <div className="setup-screen">
      <div className="setup-card">
        <div style={{textAlign:'center',marginBottom:24}}>
          <img src="/icon-192.png" style={{width:70,height:70,borderRadius:'50%',marginBottom:12}} alt="APD"/>

          <p style={{color:'var(--text3)',fontSize:14,marginTop:6}}>Conecta tu base de datos Firebase para comenzar</p>
        </div>
        <div className="setup-step">
          <div className="setup-step-num">1</div>
          <div className="setup-step-text">Visita <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> y crea un proyecto nuevo (o usa uno existente).</div>
        </div>
        <div className="setup-step">
          <div className="setup-step-num">2</div>
          <div className="setup-step-text">En tu proyecto, ve a <strong>ConfiguraciГіn del Proyecto вҶ’ Aplicaciones web</strong> y registra una nueva app web. Copia el objeto <code>firebaseConfig</code>.</div>
        </div>
        <div className="setup-step">
          <div className="setup-step-num">3</div>
          <div className="setup-step-text">Ve a <strong>Firestore Database</strong> y crea la base de datos en modo de producciГіn (o prueba). Luego ve a <strong>Storage</strong> y actГӯvalo tambiГ©n.</div>
        </div>
        <div className="setup-step">
          <div className="setup-step-num">4</div>
          <div className="setup-step-text">En Firestore вҶ’ Reglas, pon: <code>allow read, write: if true;</code> temporalmente para empezar.</div>
        </div>
        <div style={{marginTop:20}}>
          <label className="form-label">Pega aquГӯ tu Firebase Config (objeto JSON):</label>
          <textarea className="form-input" rows={7} placeholder={'{\n  "apiKey": "...",\n  "authDomain": "...",\n  "projectId": "...",\n  "storageBucket": "...",\n  "messagingSenderId": "...",\n  "appId": "..."\n}'} value={cfg} onChange={e=>setCfg(e.target.value)} style={{fontFamily:'monospace',fontSize:13}}/>
        </div>

        <button className="btn btn-primary" style={{width:'100%',marginTop:16,padding:'13px',fontSize:15}} onClick={connect} disabled={!cfg.trim()||loading}>
          {loading ? 'вҸі Conectando...' : 'рҹ”Ҙ Conectar con Firebase'}
        </button>
      </div>
    </div>
  );
}

/* в”Җв”Җв”Җ LOGIN SCREEN в”Җв”Җв”Җ */
function LoginScreen({onLogin}){
  const [u,setU]=useState('');const [p,setP]=useState('');
  const [err,setErr]=useState('');const [loading,setLoading]=useState(false);
  async function submit(e){
    e.preventDefault();setErr('');setLoading(true);
    try{
      const snap=await db.collection('users').where('username','==',u.trim()).where('active','==',true).limit(1).get();
      if(snap.empty){setErr('Usuario no encontrado.');setLoading(false);return;}
      const user={id:snap.docs[0].id,...snap.docs[0].data()};
      if(user.password!==p){setErr('ContraseГұa incorrecta.');setLoading(false);return;}
      onLogin(user);
    }catch(e){setErr('Error de conexiГіn: '+e.message);}
    setLoading(false);
  }
  return (
    <div className="login-screen">
      <div className="login-card">
        <div className="login-logo">
          <img src="/icon-192.png" alt="APD SPORT"/>
          <h1>APD SPORT</h1>
          <p>Plataforma de Entrenamiento Personal</p>
        </div>
        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">Usuario</label>
            <input className="form-input" value={u} onChange={e=>setU(e.target.value)} placeholder="Introduce tu usuario" autoFocus/>
          </div>
          <div className="form-group">
            <label className="form-label">ContraseГұa</label>
            <input className="form-input" type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="Introduce tu contraseГұa"/>
          </div>
          {err&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12,padding:'8px 12px',background:'rgba(229,62,62,.08)',borderRadius:6}}>{err}</div>}
          <button className="btn btn-primary" style={{width:'100%',padding:'12px',fontSize:15,marginTop:4}} disabled={loading}>
            {loading?'Accediendo...':'Entrar'}
          </button>
        </form>
        <p style={{textAlign:'center',color:'var(--text3)',fontSize:12,marginTop:20}}>APD Sport v2.0 В· Admin: admin / admin123</p>
      </div>
    </div>
  );
}

/* в”Җв”Җв”Җ ADMIN EXERCISES в”Җв”Җв”Җ */
function AdminExercises(){
  const [exercises,setExercises]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [search,setSearch]=useState('');
  const [catFilter,setCatFilter]=useState('');
  const [muscleFilter,setMuscleFilter]=useState('');
  const [saving,setSaving]=useState(false);

  const load=()=>DB.getAll('exercises').then(e=>{setExercises(e.sort((a,b)=>a.name.localeCompare(b.name)));setLoading(false);});
  useEffect(()=>{load();},[]);

  async function saveExercise(data){
    setSaving(true);
    try{
      let imgUrl=editing?.imgUrl||'';
      if(data.imgFile){imgUrl=await DB.uploadFile(`exercises/${editing?.id||uid()}/img`,data.imgFile);}
      const payload={name:data.name,category:data.category,muscle:data.muscle,muscle2:data.muscle2||'',equipment:data.equipment,difficulty:data.difficulty,desc:data.desc,recs:data.recs||'',imgUrl};
      if(editing){await DB.update('exercises',editing.id,payload);}
      else{await DB.add('exercises',payload);}
      setModal(false);setEditing(null);load();
    }catch(e){alert('Error: '+e.message);}
    setSaving(false);
  }

  async function remove(ex){
    if(!confirm(`ВҝEliminar "${ex.name}"?`))return;
    await DB.remove('exercises',ex.id);load();
  }

  const cats=Object.keys(CAT_LABELS);
  const muscleKeys=Object.keys(MUSCLE_LABELS);
  const filЬered=exercises.filter(e=>{
    const matchS=!search||e.name.toLowerCase().includes(search.toLowerCase());
    const matchC=!catFilter||e.category===catFilter;
    const matchM="muscleFilter||e.muscle===muscleFilter||e.muscle2?.includes(muscleFilter);
    return matchS&&matchC&&matchM;
  });

  return (
    <div>
      <div className="section-header">
        <h2>Base de Ejercicios ({exercises.length})</h2>
        <button className="btn btn-primary" onClick={()=>{setEditing(null);setModal(true);}}>+ AГұadir ejercicio</button>
      </div>
      <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <div className="search-bar" style={{maxWidth:260}}>
          <span className="search-icon">рҹ”Қ</span>
          <input className="form-input" placeholder="Buscar ejercicio..." value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:36}}/>
        </div>
        <div className="filter-bar" style={{margin:0}}>
          <span className={`filter-chip${!catFilter?' active':''}`} onClick={()=>setCatFilter('')}>Todos</span>
          {cats.map(c=><span key={c} className={`filter-chip${catFilter===c?' active':''}`} onClick={()=>setCatFilter(catFilter===c?'':c)}>{CAT_EMOJI[c]} {CAT_LABELS[c]}</span>)}
        </div>
      </div>
      <div className="filter-bar" style={{marginBottom:16}}>
        <span className={`filter-chip${!muscleFilter?' active':''}`} onClick={()=>setMuscleFilter('')}>Todos los mГәsculos</span>
        {muscleKeys.map(m=><span key={m} className={`filter-chip${muscleFilter===m?' active':''}`} onClick={()=>setMuscleFilter(muscleFilter===m?'':m)}>{MUSCLE_LABELS[m]}</span>)}
      </div>
      {loading?<div className="empty-state"><p>Cargando base de ejercicios...</p></div>:
      <div className="exercise-grid">
        {filtered.map(ex=>(
          <div key={ex.id} className="exercise-card">
            {ex.imgUrl?<img src={ex.imgUrl} className="exercise-card-img" alt={ex.name}/>:
            <div className="exercise-card-img-placeholder">{CAT_EMOJI[ex.category]||'рҹ’Ә'}</div>}
            <div className="exercise-card-name">{ex.name}</div>
            <div className="exercise-card-meta">
              <span className="badge badge-blue">{MUSCLE_LABELS[ex.muscle]||ex.muscle}</span>
              <span className={`badge ${DIFF_COLORS[ex.difficulty]||'badge-gray'}`}>{DIFF_LABELS[ex.difficulty]||ex.difficulty}</span>
              <span className="badge badge-gray">{EQUIP_LABELS[ex.equipment]||ex.equipment}</span>
            </div>
            {ex.recs&&<div style={{fontSize:12,color:'var(--text3)'}}>рҹ“Ӣ {ex.recs}</div>}
            <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.5,flex:1}}>{ex.desc?.substring(0,120)}{ex.desc?.length>120?'...':''}</div>
            <div className="exercise-card-actions">
              <button className="btn btn-ghost btn-sm" onClick={()=>{setEditing(ex);setModal(true);}}>вңҸпёҸ Editar</button>
              <button className="btn btn-danger btn-sm" onClick={()=>remove(ex)}>рҹ—‘пёҸ</button>
            </div>
          </div>
        ))}
        {filtered.length===0&&<div className="empty-state" style={{gridColumn:'1/-1'}}><div className="empty-state-icon">рҹ”Қ</div><p>No se encontraron ejercicios</p></div>}
      </div>}
      <Modal open={modal} onClose={()=>{setModal(false);setEditing(null);}} title={editing?`Editar: ${editing.name}`:'Nuevo ejercicio con asistente'} size="lg">
        {saving?<div className="empty-state"><p>вҸі Guardando ejercicio...</p></div>:
        <ExerciseWizard onComplete={saveExercise} onCancel={()=>{setModal(false);setEditing(null);}} initialData={editing?{name:editing.name,category:editing.category,muscle:editing.muscle,muscle2:editing.muscle2||'',equipment:editing.equipment,difficulty:editing.difficulty,desc:editing.desc,recs:editing.recs||'',imgFile:null,imgPrev:editing.imgUrl||''}:null}/>}
      </Modal>
    </div>
  );
}

  const [saving,setSaving]=useState(false);

  const load=()=>Promise.all([DB.getAll('routines'),DB.getAll('exercises'),DB.getWhere('users','role','==','athlete')]).then(([r,e,a])=>{setRoutines(r);setExercises(e.sort((a,b)=>a.name.localeCompare(b.name)));setAthletes(a);setLoading(false);});
  useEffect(()=>{load();},[]);

  function openCreate(){setEditing(null);setForm({name:'',description:'',exRows:[],assignedTo:[]});setModal(true);}
  function openEdit(r){setEditing(r);setForm({name:r.name,description:r.description||'',exRows:r.exercises||[],assignedTo:r.assignedTo||[]});setModal(true);}

  function addEx(ex){
    if(form.exRows.find(r=>r.exerciseId===ex.id))return;
    setForm(f=>({...f,exRows:[...f.exRows,{exerciseId:ex.id,name:ex.name,sets:3,reps:'10',rest:60,weight:'',notes:''}]}));
    setExSearch('');
  }
  function updRow(i,k,v){setForm(f=>({...f,exRows:f.exRows.map((r,idx)=>idx===i?{...r,[k]:v}:r)}));}
  function removeRow(i){setForm(f=>({...f,exRows:f.exRows.filter((_,idx)=>idx!==i)}));}
  function toggleAthlete(id){setForm(f=>({...f,assignedTo:f.assignedTo.includes(id)?f.assignedTo.filter(x=>x!==id):[...f.assignedTo,id]}));}

  async function save(){
    if(!form.name.trim()){alert('El nombre de la rutina es obligatorio.');return;}
    setSaving(true);
    try{
      const payload={name:form.name,description:form.description,exercises:form.exRows,assignedTo:form.assignedTo};
      if(editing){await DB.update('routines',editing.id,payload);}
      else{await DB.add('routines',payload);}
      setModal(false);load();
    }catch(e){alert('Error: '+e.message);}
    setSaving(false);
  }

  async function remove(r){if(!confirm(`ВҝEliminar "${r.name}"?`))return;await DB.remove('routines',r.id);load();}

  const filteredEx=exercises.filter(e=>e.name.toLowerCase().includes(exSearch.toLowerCase())&&!form.exRows.find(r=>r.exerciseId===e.id));

  return (
    <div>
      <div className="section-header">
        <h2>Rutinas ({routines.length})</h2>
        <button className="btn btn-primary" onClick={openCreate}>+ Nueva rutina</button>
      </div>

      routines.length===0?<div className="empty-state"><div className="empty-state-icon">рҹ“Ӣ</div><p>No hay rutinas creadas</p></div>:
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16}}>
        {routines.map(r=>{
          const assignedNames=athletes.filter(a=>(r.assignedTo||[]).includes(a.id)).map(a=>a.name);
          return (
            <div key={r.id} className="card" style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div style={{fontWeight:700,fontSize:16,color:'var(--primary)'}}>{r.name}</div>
                <div style={{display:'flex',gap:6}}>
                  <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>openEdit(r)}>вңҸпёҸ</button>
                  <button className="btn btn-danger btn-sm btn-icon" onClick={()=>remove(r)}>рҹ—‘пёҸ</button>
                </div>
              </div>
              {r.description&&<div style={{fontSize:13,color:'var(--text3)'}}>{r.description}</div>}
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <span className="badge badge-blue">рҹ’Ә {(r.exercises||[]).length} ejercicios</span>
                <span className="badge badge-green">рҹ‘Ҙ {(r.assignedTo||[]).length} deportistas</span>
              </div>
              {assignedNames.length>0&&<div style={{fontSize:12,color:'var(--text3)'}}>рҹ‘Ө {assignedNames.slice(0,3).join(', ')}{assignedNames.length>3?` +${assignedNames.length-3}`:''}</div>}
              {(r.exercises||[]).slice(0,4).map((ex,i)=>(
                <div key={i} style={{fontSize:13,padding:'6px 10px',background:'var(--bg2)',borderRadius:6,color:'var(--text2)'}}>
                  {ex.name} В· {ex.sets}Г—{ex.reps} {ex.weight?`@${ex.weight}kg`:''}
                </div>
              ))}
              {(r.exercises||[]).length>4&&<div style={{fontSize:12,color:'var(--text3)',textAlign:'center'}}>+{r.exercises.length-4} mГЎs</div>}
            </div>
          );
        })}
      </div>}

      <Modal open={modal} onClose={()=>setModal(false)} title={editing?'Editar rutina':'Nueva rutina'} size="xl"
        footer={<><button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'Guardando...':'Guardar rutina'}</button></>}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
          <div>
            <div className="form-group"><label className="form-label">Nombre de la rutina *</label><input className="form-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Ej: Empuje вҖ” Fuerza A"/></div>
            <div className="form-group"><label className="form-label">DescripciГіn</label><textarea className="form-input" rows={3} value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Objetivos y notas de la rutina..."/></div>
            <div className="form-group">
              <label className="form-label">Asignar a deportistas</label>
              {athletes.length===0?<div style={{fontSize:13,color:'var(--text3)'}}>No hay deportistas registrados</div>:
              <div style={{maxHeight:150,overflowY:'auto',border:'1.5px solid var(--border)',borderRadius:8,padding:8}}>
                {athletes.map(a=>(
                  <label key={a.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 4px',cursor:'pointer'}}>
                    <input type="checkbox" checked={form.assignedTo.includes(a.id)} onChange={()=>toggleAthlete(a.id)} style={{accentColor:'var(--primary)'}}/>
                    <div className="athlete-avatar" style={{width:28,height:28,fontSize:11}}>{initials(a.name)}</div>
                    <span style={{fontSize:14}}>{a.name}</span>

              </div>}
            </div>
          </div>
          <div>
            <div className="form-group">

              <input className="form-input" placeholder="Buscar ejercicio..." value={exSearch} onChange={e=>setExSearch(e.target.value)}/>

            </div>
            <div style={{maxHeight:320,overflowY:'auto'}}>
              {form.exRows.length===0?<div style={{textAlign:'center',color:'var(--text3)',fontSize:13,padding:'20px 0'}}>Busca y aГұade ejercicios</div>:
              form.exRows.map((row,i)=>(
                <div key={i} style={{border:'1.5px solid var(--border)',borderRadius:8,padding:'10px 12px',marginBottom:8}}>
                  <div style={{fontWeight:600,fontSize:14,color:'var(--primary)',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>

                    <div><div style={{fontSize:11,color:'var(--text3)',marginBottom:3}}>Series</div><input className="form-input" style={{padding:'5px 8px',fontSize:13}} type="number" min={1} value={row.sets} onChange={e=>updRow(i,'sets',+e.target.value)}/></div>
                    <div><div style={{fontSize:11,color:'var(--text3)',marginBottom:3}}>Reps</div><input className="form-input" style={{padding:'5px 8px',fontSize:13}} value={row.reps} onChange={e=>updRow(i,'reps',e.target.value)}/></div>
                    <div><div style={{fontSize:11,color:'var(--text3)',marginBottom:3}}>Peso(kg)</div><input className="form-input" style={{padding:'5px 8px',fontSize:13}} value={row.weight} onChange={e=>updRow(i,'weight',e.target.value)} placeholder="вҖ”"/></div>
                    <div><div style={{fontSize:11,color:'var(--text3)',marginBottom:3}}>Desc(s)</div><input className="form-input" style={{padding:'5px 8px',fontSize:13}} type="number" value={row.rest} onChange={e=>updRow(i,'rest',+e.target.value)}/></div>

          </div>
        </div>
      </Modal>
    </div>
  );
}

/* в”Җв”Җв”Җ ADMIN FEEDBACK в”Җв”Җв”Җ */
function AdminFeedback(){
  const [sessions,setSessions]=useState([]);
  const [athletes,setAthletes]=useState([]);
  const [routines,setRoutines]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('pending');

  const load=()=>Promise.all([
    DB.getWhere('sessions','status','==','completed'),
    DB.getAll('users'),
    DB.getAll('routines')
  ]).then(([s,u,r])=>{setSessions(s.filter(x=>x.feedback));setAthletes(u);setRoutines(r);setLoading(false);});
  useEffect(()=>{load();},[]);

  async function markRead(s){await DB.update('sessions',s.id,{feedbackRead:true});load();}

  const pending=sessions.filter(s=>!s.feedbackRead);
  const read=sessions.filter(s=>s.feedbackRead);
  const shown=tab==='pending'?pending:read;

  function exportFeedback(){
    const rows=sessions.map(s=>{
      const a=athletes.find(u=>u.id===s.athleteId);
      const r=routines.find(rt=>rt.id===s.routineId);
      return {Deportista:a?.name||s.athleteId,Rutina:r?.name||s.routineId,Fecha:fmt(s.completedAt),Feedback:s.feedback,Leido:s.feedbackRead?'SГӯ':'No'};
    });
    exportCSV(rows,'feedback_apd.csv');
  }

  return (
    <div>
      <div className="section-header">
        <h2>Feedback recibido</h2>
        <div style={{display:'flex',gap:10}}>
          <span className="badge badge-red">{pending.length} pendientes</span>
          <button className="btn btn-ghost btn-sm" onClick={exportFeedback}>в¬ҮпёҸ Exportar CSV</button>
        </div>
      </div>
      <div className="tabs">
        <div className={`tab${tab==='pending'?' active':''}`} onClick={()=>setTab('pending')}>Pendientes ({pending.length})</div>
        <div className={`tab${tab==='read'?' active':''}`} onClick={()=>setTab('read')}>LeГӯdos ({read.length})</div>
      </div>
      {loading?<div className="empty-state"><p>Cargando...</p></div>:
      shown.length===0?<div className="empty-state"><div className="empty-state-icon">рҹ’¬</div><p>No hay {tab==='pending'?'feedback pendiente':'feedback leГӯdo'}</p></div>:
      shown.map(s=>{
        const athlete=athletes.find(u=>u.id===s.athleteId);
        const routine=routines.find(r=>r.id===s.routineId);
        return (
          <div key={s.id} className={`feedback-item${s.feedbackRead?' read':''}`}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div className="athlete-avatar" style={{width:38,height:38,fontSize:14}}>{initials(athlete?.name||'?')}</div>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{athlete?.name||'Deportista'}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>рҹ“Ӣ {routine?.name||'Rutina'} В· {fmt(s.completedAt)}</div>
                </div>
              </div>
              {!s.feedbackRead&&<button className="btn btn-ghost btn-sm" onClick={()=>markRead(s)}>вң“ Marcar leГӯdo</button>}
            </div>
            <div style={{background:'var(--bg2)',borderRadius:8,padding:'12px 14px',fontSize:14,lineHeight:1.6,color:'var---text2)'}}>
              "{s.feedback}"
            </div>
            {s.duration&&<div style={{fontSize:12,color:'var(--text3)',marginTop:8}}>вҸұпёҸ DuraciГіn: {Math.round(s.duration/60)} min</div>}
          </div>
        );
      })}
    </div>
  );
}

/* в”Җв”Җв”Җ ACTIVE WORKOUT в”Җв”Җв”Җ */
function AthleteWorkout({user}){
  const [routines,setRoutines]=useState([]);
  const [selected,setSelected]=useState(null);
  const [exercises,setExercises]=useState([]);
  const [phase,setPhase]=useState('select');
  const [sets,setSets]=useState({});
  const [startTime,setStartTime]=useState(null);
  const [timer,setTimer]=useState(0);
  const [restTimer,setRestTimer]=useState(null);
  const [feedback,setFeedback]=useState('');
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const timerRef=useRef();

  useEffect(()=>{
    Promise.all([DB.getWhere('routines','assignedTo','array-contains',user.id),DB.getAll('exercises')])
    .then(([r,e])=>{setRoutines(r);setExercises(e);setLoading(false);});
  },[]);

  useEffect(()=>{
    if(phase==='active'){
      setStartTime(Date.now());
      timerRef.current=setInterval(()=>setTimer(t=>t+1),1000);
    }
    return()=>clearInterval(timerRef.current);
  },[phase]);

  function startWorkout(r){
    setSelected(r);
    const initialSets={};
    (r.exercises||[]).forEach((ex,i)=>{
      initialSets[i]=Array.from({length:ex.sets},()=>({reps:ex.reps,weight:ex.weight||'',done:false}));
    });
    setSets(initialSets);
    setPhase('active');
  }

  function toggleSet(exIdx,setIdx){
    setSets(prev=>{
      const updated={...prev};
      updated[exIdx]=[...updated[exIdx]];
      updated[exIdx][setIdx]={...updated[exIdx][setIdx],done:!updated[exIdx][setIdx].done};
      const justDone=updated[exIdx][setIdx].done;
      if(justDone&&selected.exercises[exIdx].rest>0){setRestTimer(selected.exercises[exIdx].rest);}
      return updated;
    });
  }
  function updateSet(exIdx,setIdx,field,val){setSets(prev=>{const u={...prev};u[exIdx]=[...u[exIdx]];u[exIdx][setIdx]={...u[exIdx][setIdx],[field]:val};return u;});}

  useEffect(()=>{
    if(restTimer===null)return;
    if(restTimer<=0){setRestTimer(null);return;}
    const t=setTimeout(()=>setRestTimer(r=>r-1),1000);
    return()=>clearTimeout(t);
  },[restTimer]);

  async function completeWorkout(){
    setSaving(true);
    try{
      const log=(selected.exercises||[]).map((ex,i)=>({exerciseId:ex.exerciseId,name:ex.name,sets:sets[i]||[]}));
      await DB.add('sessions',{routineId:selected.id,athleteId:user.id,startedAt:startTime,completedAt:Date.now(),duration:timer,status:'completed',feedback,exerciseLog:log,feedbackRead:false});
      setPhase('done');
    }catch(e){alert('Error al guardar: '+e.message);}
    setSaving(false);
  }

  if(phase==='select') return (
    <div>
      <div style={{marginBottom:20}}><h2 style={{fontSize:20,fontWeight:800,color:'var(--primary)'}}>ВҝQuГ© entrenas hoy? рҹҸӢпёҸ</h2><p style={{color:'var(--text3)',fontSize:14,marginTop:4}}>Selecciona la rutina para iniciar el entrenamiento</p></div>
      {loading?<div className="empty-state"><p>Cargando rutinas...</p></div>:
      routines.length===0?<div className="empty-state"><div className="empty-state-icon">рҹ“ӯ</div><p>No tienes rutinas asignadas. Contacta con tu entrenador.</p></div>:
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
        {routines.map(r=>(
          <div key={r.id} className="card" style={{cursor:'pointer',transition:'.15s',border:'2px solid transparent'}} onClick={()=>startWorkout(r)}
            onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent)'} onMouseLeave={e=>e.currentTarget.style.borderColor='transparent'}>
            <div style={{fontSize:32,marginBottom:12,textAlign:'center'}}>рҹҸӢпёҸ</div>
            <div style={{fontWeight:700,fontSize:17,color:'var(--primary)',marginBottom:6,textAlign:'center'}}>{r.name}</div>
            {r.description&&<div style={{fontSize:13,color:'var(--text3)',marginBottom:12,textAlign:'center'}}>{r.description}</div>}
            <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center',marginBottom:14}}>
              <span className="badge badge-blue">рҹ’Ә {(r.exercises||[]).length} ejercicios</span>
            </div>
            <button className="btn btn-accent" style={{width:'100%'}}>в–¶ Empezar entrenamiento</button>
          </div>
        ))}
      </div>}
    </div>
  );

  if(phase==='done') return (
    <div style={{textAlign:'center',maxWidth:480,margin:'0 auto',paddingTop:40}}>
      <div style={{fontSize:72,marginBottom:16}}>рҹҺү</div>
      <h2 style={{fontSize:26,fontWeight:800,color:'var(--primary)',marginBottom:8}}>ВЎEntrenamiento completado!</h2>
      <p style={{color:'var(--text3)',marginBottom:24}}>DuraciГіn: {fmtTime(timer)} В· {selected.name}</p>
      <div style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',padding:24,boxShadow:'var(--shadow)',marginBottom:20}}>
        <div style={{fontSize:15,fontWeight:600,color:'var(--primary)',marginBottom:12}}>Tu feedback ha sido enviado al entrenador вң…</div>
        {feedback&&<div style={{background:'var(--bg2)',borderRadius:8,padding:'12px 14px',fontSize:14,color:'var(--text2)',fontStyle:'italic'}}>"{feedback}"</div>}
      </div>
      <button className="btn btn-primary" style={{padding:'12px 32px'}} onClick={()=>setPhase('select')}>Volver al inicio</button>
    </div>
  );

  const allDone=(selected.exercises||[]).every((_,i)=>sets[i]?.every(s=>s.done));

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:800,color:'var(--primary)'}}>{selected.name}</h2>
          <div style={{fontSize:13,color:'var(--text3)'}}>вҸұпёҸ {fmtTime(timer)}</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <span className="badge badge-blue">{(selected.exercises||[]).filter((_,i)=>sets[i]?.every(s=>s.done)).length}/{(selected.exercises||[]).length} completados</span>
          <button className="btn btn-ghost btn-sm" onClick={()=>{if(confirm('ВҝAbandonar el entrenamiento?'))setPhase('select');}}>вң• Salir</button>
        </div>
      </div>

      {restTimer!==null&&<div className="rest-timer"><div style={{fontSize:13,marginBottom:4,opacity:.8}}>вҸё Descansando...</div><div className="timer-val">{fmtTime(restTimer)}</div><button className="btn btn-sm" style={{background:'rgba(255,255,255,.2)',color:'#fff',marginTop:8}} onClick={()=>setRestTimer(null)}>Saltar descanso</button></div>}

      {(selected.exercises||[]).map((ex,exIdx)=>{
        const exData=exercises.find(e=>e.id===ex.exerciseId);
        const exSets=sets[exIdx]||[];
        const allSetsDone=exSets.every(s=>s.done);
        return (
          <div key={exIdx} className={`workout-exercise${allSetsDone?' done':''}`}>
            {exData?.imgUrl&&<img src={exData.imgUrl} style={{width:'100%',height:120,objectFit:'cover',borderRadius:8,marginBottom:10}} alt=""/>}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
              <div style={{fontWeight:700,fontSize:16,color:allSetsDone?'var(--green)':'var(--primary)'}}>{allSetsDone?'вң… ':''}{ex.name}</div>
              <span className="badge badge-blue">{ex.sets}Г—{ex.reps}{ex.weight?` @${ex.weight}kg`:''}</span>
            </div>
            {exData?.desc&&<div style={{fontSize:12,color:'var(--text3)',marginBottom:10,lineHeight:1.5}}>{exData.desc}</div>}
            {ex.notes&&<div style={{fontSize:12,color:'var(--primary)',marginBottom:8,padding:'6px 10px',background:'rgba(47,59,105,.06)',borderRadius:6}}>рҹ’Ў {ex.notes}</div>}
            <div style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr 32px',gap:6,alignItems:'center'}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textAlign:'center'}}>#</div>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textAlign:'center'}}>REPS</div>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textAlign:'center'}}>PESO (kg)</div>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textAlign:'center'}}>вң“</div>
              {exSets.map((s,si)=>(
                <>
                  <div key={`n${si}`} style={{textAlign:'center',fontWeight:700,fontSize:13,color:s.done?'var(--green)':'var(--text3)'}}>{si+1}</div>
                  <input key={`r${si}`} className="set-input" style={{background:s.done?'rgba(44,203,26,.08)':'',transition:'.2s'}} value={s.reps} onChange={e=>updateSet(exIdx,si,'reps',e.target.value)}/>
                  <input key={`w${si}`} className="set-input" style={{background:s.done?'rgba(44,203,26,.08)':'',transition:'.2s'}} placeholder="вҖ”" value={s.weight} onChange={e=>updateSet(exIdx,si,'weight',e.target.value)}/>
                  <div key={`c${si}`} style={{textAlign:'center'}}><input type="checkbox" className="set-check" checked={s.done} onChange={()=>toggleSet(exIdx,si)}/></div>
                </>
              ))}
            </div>
            {ex.rest>0&&<div style={{fontSize:12,color:'var(--text3)',marginTop:8}}>вҸұ Descanso sugerido: {ex.rest}s</div>}
          </div>
        );
      })}

      <div className="card" style={{marginTop:20}}>
        <div className="card-title">рҹ’¬ Feedback para tu entrenador</div>
        <textarea className="form-input" rows={4} placeholder="ВҝCГіmo te has sentido? ВҝAlgГәn ejercicio difГӯcil? ВҝDudas?..." value={feedback} onChange={e=>setFeedback(e.target.value)}/>
        <button className={`btn ${allDone?'btn-accent':'btn-primary'} `} style={{width:'100%',marginTop:12,padding:'13px',fontSize:15}} onClick={()=>{if(!feedback.trim()&&!confirm('ВҝCompletar sin dejar feedback?'))return;completeWorkout();}} disabled={saving}>
          {saving?'вҸі Guardando...':'вң… Completar entrenamiento'}
        </button>
        {!allDone&&<div style={{fontSize:12,color:'var(--text3)',textAlign:'center',marginTop:8}}>Puedes completar aunque no hayas terminado todos los sets</div>}
      </div>
    </div>
  );
}

/* в”Җв”Җв”Җ ATHLETE HISTORY в”Җв”Җв”Җ */
function AthleteHistory({user}){
  const [sessions,setSessions]=useState([]);
  const [routines,setRoutines]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    Promise.all([DB.getWhere('sessions','athleteId','==',user.id),DB.getAll('routines')])
    .then(([s,r])=>{setSessions(s.sort((a,b)=>(b.startedAt||0)-(a.startedAt||0)));setRoutines(r);setLoading(false);});
  },[]);

  function exportHistory(){
    const rows=sessions.map(s=>{
      const r=routines.find(rt=>rt.id===s.routineId);
      return {Fecha:fmt(s.startedAt),Rutina:r?.name||s.routineId,Duracion_min:s.duration?Math.round(s.duration/60):'вҖ”',Estado:s.status==='completed'?'Completada':'Incompleta',Feedback:s.feedback||''};
    });
    exportCSV(rows,`historial_${user.name.replace(/ /g,'_')}.csv`);
  }

  return (
    <div>
      <div className="section-header">
        <h2>Mi historial ({sessions.length} sesiones)</h2>
        <button className="btn btn-ghost btn-sm" onClick={exportHistory}>в¬ҮпёҸ Exportar CSV</button>
      </div>
      {loading?<div className="empty-state"><p>Cargando...</p></div>:
      sessions.length===0?<div className="empty-state"><div className="empty-state-icon">рҹ“…</div><p>AГәn no tienes sesiones registradas</p></div>:
      sessions.map(s=>{
        const routine=routines.find(r=>r.id===s.routineId);
        return (
          <div key={s.id} style={{background:'var(--surface)',borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow)',padding:'16px 20px',marginBottom:12,borderLeft:`4px solid ${s.status==='completed'?'var(--green)':'var(--primary-lighter)'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:'var(--primary)'}}>{routine?.name||'Entrenamiento'}</div>
                <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>рҹ“… {fmt(s.startedAt)} {s.duration?`В· вҸұпёҸ ${Math.round(s.duration/60)} min`:''}</div>
              </div>
              <span className={`badge ${s.status==='completed'?'badge-green':'badge-gray'}`}>{s.status==='completed'?'вң… Completada':'Parcial'}</span>
            </div>
            {s.feedback&&<div style={{fontSize:13,color:'var(--text2)',background:'var(--bg2)',borderRadius:6,padding:'8px 12px',fontStyle:'italic'}}>"{s.feedback}"</div>}
            {(s.exerciseLog||[]).length>0&&<div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap'}}>{s.exerciseLog.slice(0,5).map((ex,i)=><span key={i} className="badge badge-blue" style={{fontSize:11}}>{ex.name}</span>)}{s.exerciseLog.length>5&&<span className="badge badge-gray" style={{fontSize:11}}>+{s.exerciseLog.length-5} mГЎs</span>}</div>}
          </div>
        );
      })}
    </div>
  );
}

/* в”Җв”Җв”Җ ATHLETE PROGRESS в”Җв”Җв”Җ */
function AthleteProgress({user}){
  const [sessions,setSessions]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{DB.getWhere('sessions','athleteId','==',user.id).then(s=>{setSessions(s);setLoading(false);});} ,[]);

  const last4weeks=Array.from({length:4},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-28+(i*7));d.setHours(0,0,0,0);
    const end=new Date(d);end.setDate(end.getDate()+7);
    return {semana:`Sem ${i+1}`,sesiones:sessions.filter(s=>s.startedAt&&s.startedAt>=d.getTime()&&s.startedAt<end.getTime()).length};
  });

  const last8weeks=Array.from({length:8},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-56+(i*7));d.setHours(0,0,0,0);
    const end=new Date(d);end.setDate(end.getDate()+7);
    const wSessions=sessions.filter(s=>s.startedAt&&s.startedAt>=d.getTime()&&s.startedAt<end.getTime()&&s.status==='completed');
    const totalDuration=wSessions.reduce((a,s)=>a+(s.duration||0),0);
    return {semana:`S${i+1}`,min:Math.round(totalDuration/60),completadas:wSessions.length};
  });

  const completed=sessions.filter(s=>s.status==='completed');
  const totalMin=Math.round(sessions.reduce((a,s)=>a+(s.duration||0),0)/60);
  const streak=(()=>{let s=0;const today=new Date();today.setHours(0,0,0,0);for(let i=0;i<30;i++){const d=new Date(today);d.setDate(d.getDate()-i);const next=new Date(d);next.setDate(next.getDate()+1);if(sessions.some(se=>se.startedAt&&se.startedAt>=d.getTime()&&se.startedAt<next.getTime()))s++;else break;}return s;})();

  return (
    <div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-icon" style={{background:'rgba(47,59,105,.1)'}}>рҹ”Ҙ</div><div><div className="stat-val">{streak}</div><div className="stat-label">DГӯas de racha</div></div></div>
        <div className="stat-card"><div className="stat-icon" style={{background:'rgba(44,203,26,.12)'}}>вң…</div><div><div className="stat-val">{completed.length}</div><div className="stat-label">Sesiones completadas</div></div></div>
        <div className="stat-card"><div className="stat-icon" style={{background:'rgba(253,202,0,.15)'}}>вҸұпёҸ</div><div><div className="stat-val">{totalMin}</div><div className="stat-label">Minutos totales</div></div></div>
        <div className="stat-card"><div className="stat-icon" style={{background:'rgba(61,79,138,.12)'}}>рҹ“…</div><div><div className="stat-val">{sessions.length}</div><div className="stat-label">Sesiones totales</div></div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div className="card">
          <div className="card-title">рҹ“Ҳ Sesiones por semana (4 semanas)</div>
          <div className="chart-container">
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={last4weeks} margin={{top:0,right:0,left:-20,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="var(--border)"/>
                <XAxis dataKey="semana" tick={{fontSize:12,fill:'var(--text3)'}}/>
                <YAxis tick={{fontSize:12,fill:'var(--text3)'}} allowDecimals={false}/>
                <Tooltip/>
                <Bar dataKey="sesiones" fill="var(--primary)" radius={[4,4,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="card">
          <div className="card-title">вҸұпёҸ Minutos entrenados (8 semanas)</div>
          <div className="chart-container">
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={last8weeks} margin={{top:0,right:0,left:-20,bottom:0}}>
                <CartesianGrid strokeDasharray="3 3" stroke="var(--border)"/>
                <XAxis dataKey="semana" tick={{fontSize:12,fill:'var(--text3)'}}/>
                <YAxis tick={{fontSize:12,fill:'var(--text3)'}}/>
                <Tooltip/>
                <Line type="monotone" dataKey="min" stroke="var(--accent)" strokeWidth={2.5} dot={{fill:'var(--accent)',r:4}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
    </div>
  );
}

/* в”Җв”Җв”Җ ATHLETE APP в”Җв”Җв”Җ */
const ATHLETE_NAV=[
  {id:'dashboard',icon:'рҹҸ ',label:'Mi Panel'},
  {id:'workout',icon:'в–¶пёҸ',label:'Entrenar'},
  {id:'history',icon:'рҹ“…',label:'Historial'},
  {id:'progress',icon:'рҹ“Ҳ',label:'Mi Progreso'},
];
function AthleteApp({user,onLogout}){
  const [page,setPage]=useState('dashboard');
  const titles={dashboard:'Mi Panel',workout:'Entrenar',history:'Mi Historial',progress:'Mi Progreso'};
  const pages={
    dashboard:<AthleteDashboard user={user} setPage={setPage}/>,
    workout:<AthleteWorkout user={user}/>,
    history:<AthleteHistory user={user}/>,
    progress:<AthleteProgress user={user}/>
  };
  return (
    <div className="app-shell">
      <Sidebar items={ATHLETE_NAV} page={page} setPage={setPage} user={user} onLogout={onLogout}/>
      <div className="main-content">
        <div className="topbar">
          <span className="topbar-title">{titles[page]}</span>
          <div className="topbar-user">
            <span style={{fontSize:12,color:'var(--text3)'}}>Deportista</span>
            <div className="avatar" style={{background:'var(--accent)',color:'var(--primary-dark)'}}>{user.avatarUrl?<img src={user.avatarUrl} style={{width:'100%',height:'100%',borderRadius:'50%',objectFit:'cover'}} alt=""/>:initials(user.name)}</div>
          </div>
        </div>
        <div className="page-body">{pages[page]}</div>
      </div>
    </div>
  );
}

/* в”Җв”Җв”Җ APP ROOT в”Җв”Җв”Җ */
function App(){
  const [ready,setReady]=useState(false);
  const [user,setUser]=useState(null);

  // Try saved session
  useEffect(()=>{
    const saved=localStorage.getItem('apd_session');
    if(saved){try{setUser(JSON.parse(saved));}catch(e){}}
  },[]);

  function login(u){setUser(u);localStorage.setItem('apd_session',JSON.stringify(u));}
  function logout(){setUser(null);localStorage.removeItem('apd_session');}

  if(!ready) return <FirebaseSetup onReady={()=>setReady(true)}/>;
  if(!user) return <LoginScreen onLogin={login}/>;
  if(user.role==='admin') return <AdminApp user={user} onLogout={logout}/>;
  return <AthleteApp user={user} onLogout={logout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
